name: 酷狗音乐自动签到

on:
  workflow_dispatch: # 保留手动触发功能
  schedule:
    # 北京时间 00:01 对应 UTC 时间 16:01（前一天）
    - cron: '1 16 * * *' 

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./kgcheckin/package-lock.json

      - name: 安装依赖
        run: cd kgcheckin && npm install

      - name: 运行签到脚本
        run: cd kgcheckin && npm run main
        env:
          USERINFO: ${{ secrets.USERINFO }}
